<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Lacrosse Arena 3D</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0c1a0c; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  canvas#three { display: block; width: 100vw; height: 100vh; touch-action: none; position: fixed; inset: 0; }

  /* Loading screen */
  #loading { position: fixed; inset: 0; background: #0c1a0c; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; font-family: inherit; font-weight: 700; letter-spacing: 2px; font-size: 16px; transition: opacity .35s; }
  #loading .spinner { width: 38px; height: 38px; border: 3px solid rgba(255,255,255,.12); border-top-color: #2bc26b; border-radius: 50%; animation: spin .9s linear infinite; margin-bottom: 14px; }
  #loading.hide { opacity: 0; pointer-events: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HUD */
  #hud { position: fixed; top: 0; left: 0; right: 0; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,.6); z-index: 5; }
  #hud .side { display: flex; align-items: center; gap: 8px; min-width: 0; }
  #hud .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(255,255,255,.4); flex-shrink: 0; }
  #hud .name { font-size: 14px; max-width: 26vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #hud .center { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,.45); padding: 6px 14px; border-radius: 999px; font-variant-numeric: tabular-nums; }
  #hud .score { font-size: 22px; }
  #hud .clock { font-size: 18px; opacity: .9; }
  #hud .vs { opacity: .6; }

  /* Menu */
  [hidden] { display: none !important; }
  #menu, #result { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(8,30,12,.92), rgba(4,15,6,.96)); z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom)); overflow-y: auto; }
  #menu h1 { font-size: 36px; letter-spacing: 2px; margin: 8px 0 4px; text-transform: uppercase; }
  #menu .tag { opacity: .6; font-size: 13px; margin-bottom: 18px; letter-spacing: 1px; }
  .picks { display: flex; gap: 14px; width: 100%; max-width: 880px; flex-wrap: wrap; justify-content: center; }
  .pick-col { flex: 1; min-width: 280px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 14px; }
  .pick-col h2 { font-size: 14px; opacity: .8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .pick-col h2 button { background: rgba(255,255,255,.08); color: #fff; border: 0; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; letter-spacing: 1px; }
  .pick-col h2 button:hover { background: rgba(255,255,255,.16); }
  .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .team-btn { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,.05); border: 2px solid transparent; cursor: pointer; color: inherit; font: inherit; text-align: left; transition: transform .08s, border-color .12s, background .12s; }
  .team-btn:hover { background: rgba(255,255,255,.1); }
  .team-btn.selected { border-color: #fff; background: rgba(255,255,255,.14); }
  .team-btn .crest { width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(255,255,255,.6); flex-shrink: 0; }
  .team-btn .info { display: flex; flex-direction: column; min-width: 0; }
  .team-btn .info .nm { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-btn .info .st { font-size: 10px; opacity: .6; letter-spacing: .5px; }

  #startBtn, .ctrl-btn { margin-top: 18px; background: #2bc26b; color: #04200d; border: 0; padding: 14px 36px; border-radius: 999px; font-size: 16px; font-weight: 800; letter-spacing: 1.5px; cursor: pointer; text-transform: uppercase; box-shadow: 0 6px 18px rgba(43,194,107,.3); }
  #startBtn:hover, .ctrl-btn:hover { transform: translateY(-1px); }
  #startBtn:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; }
  .hint { margin-top: 14px; font-size: 12px; opacity: .55; text-align: center; line-height: 1.6; max-width: 560px; }

  /* Result */
  #result h2 { margin-top: 60px; font-size: 28px; text-align: center; }
  #result .final { font-size: 64px; font-weight: 800; margin: 20px 0; font-variant-numeric: tabular-nums; letter-spacing: 4px; }
  #result .mvp { font-size: 14px; opacity: .8; margin-bottom: 10px; }
  #result .btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  #result .ctrl-btn.alt { background: rgba(255,255,255,.1); color: #fff; box-shadow: none; }

  /* Touch */
  #touch { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: none; }
  #touch.show { display: block; }
  #stickArea { position: absolute; left: 0; bottom: 0; width: 50%; height: 60%; pointer-events: auto; }
  #stickBase { position: absolute; width: 110px; height: 110px; border-radius: 50%; background: rgba(255,255,255,.06); border: 2px solid rgba(255,255,255,.2); display: none; transform: translate(-50%, -50%); }
  #stickKnob { position: absolute; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,.35); border: 2px solid rgba(255,255,255,.6); display: none; transform: translate(-50%, -50%); }
  #actions { position: absolute; right: 16px; bottom: max(20px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 14px; pointer-events: auto; }
  #actions button { width: 84px; height: 84px; border-radius: 50%; border: 2px solid rgba(255,255,255,.5); background: rgba(0,0,0,.35); color: #fff; font-weight: 800; font-size: 14px; letter-spacing: 1px; backdrop-filter: blur(4px); }
  #actions button:active { background: rgba(255,255,255,.25); }
  #actions #shootBtn { background: rgba(231,76,60,.45); border-color: rgba(255,150,150,.7); }
  #actions #passBtn { background: rgba(52,152,219,.45); border-color: rgba(150,200,255,.7); }

  #toast { position: fixed; top: 56px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.7); padding: 8px 18px; border-radius: 999px; font-size: 14px; font-weight: 700; letter-spacing: 1px; pointer-events: none; z-index: 8; opacity: 0; transition: opacity .25s; }
  #toast.show { opacity: 1; }

  @media (max-width: 600px) {
    #menu h1 { font-size: 26px; }
    #hud .name { display: none; }
    .team-btn { padding: 8px; }
  }
</style>
</head>
<body>
<canvas id="three"></canvas>
<div id="loading"><div class="spinner"></div>LOADING 3D ENGINE</div>

<div id="hud" hidden>
  <div class="side" id="hudHome">
    <div class="swatch"></div><div class="name"></div>
  </div>
  <div class="center">
    <span class="score" id="scoreHome">0</span>
    <span class="vs">:</span>
    <span class="score" id="scoreAway">0</span>
    <span class="clock" id="clock">4:00</span>
  </div>
  <div class="side" id="hudAway" style="justify-content:flex-end">
    <div class="name"></div><div class="swatch"></div>
  </div>
</div>

<div id="toast"></div>

<div id="menu">
  <h1>Lacrosse Arena</h1>
  <div class="tag">8 TEAMS · QUICK MATCH</div>
  <div class="picks">
    <div class="pick-col">
      <h2>Your Team</h2>
      <div class="team-grid" id="homeTeams"></div>
    </div>
    <div class="pick-col">
      <h2>Opponent <button id="randomOpp">RANDOM</button></h2>
      <div class="team-grid" id="awayTeams"></div>
    </div>
  </div>
  <button id="startBtn" disabled>Start Match</button>
  <p class="hint">Desktop: <b>WASD</b> move &nbsp;·&nbsp; <b>Space</b> shoot/check &nbsp;·&nbsp; <b>Shift</b> pass &nbsp;·&nbsp; <b>P</b> pause<br>Mobile: drag the left side to move &nbsp;·&nbsp; tap <b>Shoot</b> or <b>Pass</b></p>
</div>

<div id="result" hidden>
  <h2 id="resultText">Full Time</h2>
  <div class="final" id="resultScore">0 : 0</div>
  <div class="mvp" id="resultMvp"></div>
  <div class="btns">
    <button class="ctrl-btn" id="rematchBtn">Rematch</button>
    <button class="ctrl-btn alt" id="menuBtn">Change Teams</button>
  </div>
</div>

<div id="touch">
  <div id="stickArea"></div>
  <div id="stickBase"></div>
  <div id="stickKnob"></div>
  <div id="actions">
    <button id="shootBtn">SHOOT</button>
    <button id="passBtn">PASS</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "@dimforge/rapier3d-compat": "https://esm.sh/@dimforge/rapier3d-compat@0.12.0"
  }
}
</script>

<script type="module">
"use strict";

import * as THREE from 'three';
import * as RAPIER from '@dimforge/rapier3d-compat';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

await RAPIER.init();

// Pre-load rigged character (Three.js Soldier — MIT). One source mesh, cloned per player.
const characterAsset = await new Promise((resolve, reject) => {
  new GLTFLoader().load("assets/character.glb",
    (gltf) => {
      const root = gltf.scene;
      root.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
      resolve({ scene: root, animations: gltf.animations });
    },
    undefined,
    (err) => { console.warn("Character load failed, using capsule fallback:", err); resolve(null); }
  );
});

// ===== Teams =====
const TEAMS = [
  { name: "Red Foxes",     primary: "#e23d3d", secondary: "#ffffff", speed: 1.02, shoot: 1.05, defense: 0.98 },
  { name: "Blue Hawks",    primary: "#2e6cf2", secondary: "#ffffff", speed: 1.00, shoot: 1.00, defense: 1.00 },
  { name: "Green Wolves",  primary: "#1f9a4d", secondary: "#ffffff", speed: 1.04, shoot: 0.97, defense: 1.02 },
  { name: "Yellow Bees",   primary: "#f5c518", secondary: "#222222", speed: 1.06, shoot: 0.98, defense: 0.96 },
  { name: "Purple Vipers", primary: "#8e44ad", secondary: "#ffffff", speed: 0.98, shoot: 1.06, defense: 1.02 },
  { name: "Orange Tigers", primary: "#e67e22", secondary: "#ffffff", speed: 1.01, shoot: 1.03, defense: 0.99 },
  { name: "Cyan Sharks",   primary: "#1abc9c", secondary: "#ffffff", speed: 1.03, shoot: 1.00, defense: 1.01 },
  { name: "Black Ravens",  primary: "#1a1a1a", secondary: "#e0e0e0", speed: 0.99, shoot: 1.02, defense: 1.06 },
];

// ===== Constants =====
const FIELD_W = 110;
const FIELD_H = 60;
const GOAL_W  = 8;
const GOAL_Y1 = (FIELD_H - GOAL_W) / 2;
const GOAL_Y2 = GOAL_Y1 + GOAL_W;
const GOAL_X_HOME = 5;          // home defends this x (left side goal line)
const GOAL_X_AWAY = FIELD_W - 5;
const CREASE_R = 5;
const PLAYER_R = 1.3;
const BALL_R = 0.45;
const MATCH_TIME = 240;          // seconds
const BASE_SPEED = 16;
const CARRIER_SPEED_MULT = 0.94;
const SHOOT_SPEED = 55;
const PASS_SPEED  = 36;
const BALL_DRAG   = 0.985;
const PICKUP_RANGE = PLAYER_R + BALL_R + 0.6;
const PICKUP_COOLDOWN = 0.35;
const ACTION_COOLDOWN = 0.45;
const CHECK_RANGE = PLAYER_R * 2 + 0.6;

// ===== State =====
const state = {
  phase: "menu",   // menu | ready | play | goal | end
  clock: MATCH_TIME,
  goalTimer: 0,
  readyTimer: 0,
  score: { home: 0, away: 0 },
  scorers: {},     // playerId -> goals
  teams: { home: null, away: null },
  players: [],
  ball: { x: FIELD_W/2, y: FIELD_H/2, z: BALL_R, vx: 0, vy: 0, vz: 0, body: null, carrier: null, lastTouch: null, pickupCooldown: 0, lastShooter: null, trail: [] },
  controlled: null,
  input: { ax: 0, ay: 0, shoot: false, pass: false, shootEdge: false, passEdge: false },
  paused: false,
};

// ===== Three.js renderer / scene =====
const isTouchDevice = !matchMedia("(hover: hover) and (pointer: fine)").matches;
const canvas3 = document.getElementById("three");
const renderer = new THREE.WebGLRenderer({ canvas: canvas3, antialias: true, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(devicePixelRatio, isTouchDevice ? 1 : 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9bcfe8);
scene.fog = new THREE.Fog(0xc8d8ec, 130, 280);

// Load HDRI sky (CC0 — Polyhaven Kloofendal). Async, applied when ready.
new RGBELoader().load("assets/sky.hdr", (tex) => {
  tex.mapping = THREE.EquirectangularReflectionMapping;
  scene.environment = tex;
  scene.background = tex;
  scene.backgroundBlurriness = 0.22;        // soften the sun so it doesn't bloom
  scene.backgroundIntensity = 0.55;         // dim visible sky
  scene.environmentIntensity = 0.35;        // dampen HDRI-driven specular
}, undefined, (err) => {
  console.warn("HDRI load failed, falling back to flat sky:", err);
});

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.5, 500);
camera.position.set(0, 60, 70);
const camLookTarget = new THREE.Vector3(0, 1, 0);
camera.lookAt(camLookTarget);

// Post-processing composer: scene render -> bloom (only on bright pixels) -> output
const useBloom = !isTouchDevice;
let composer = null, bloomPass = null;
if (useBloom) {
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  // Selective bloom: very high threshold + tight radius so only the ball gets a tasteful glow
  bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.45, 0.35, 1.75);
  composer.addPass(bloomPass);
  composer.addPass(new OutputPass());
}

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (composer) composer.setSize(innerWidth, innerHeight);
}
addEventListener("resize", onResize);
addEventListener("orientationchange", onResize);

// ===== Lighting =====
const sun = new THREE.DirectionalLight(0xfff2cc, 1.9);
sun.position.set(45, 90, 25);
sun.target.position.set(0, 0, 0);
sun.castShadow = true;
sun.shadow.mapSize.set(isTouchDevice ? 1024 : 2048, isTouchDevice ? 1024 : 2048);
sun.shadow.camera.left = -70;
sun.shadow.camera.right = 70;
sun.shadow.camera.top = 50;
sun.shadow.camera.bottom = -50;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 220;
sun.shadow.bias = -0.0005;
sun.shadow.normalBias = 0.025;
scene.add(sun);
scene.add(sun.target);

const hemi = new THREE.HemisphereLight(0xb8e1ff, 0x3a5e3a, 0.55);
scene.add(hemi);

const ambient = new THREE.AmbientLight(0xffffff, 0.18);
scene.add(ambient);

// ===== Field =====
const fieldGroup = new THREE.Group();
scene.add(fieldGroup);
{
  // PBR grass textures (CC0 — ambientCG Grass004)
  const texLoader = new THREE.TextureLoader();
  const tile = (t, n = 28, m = 16) => {
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.repeat.set(n, m);
    t.anisotropy = 16;
    return t;
  };
  const grassAlbedo = tile(texLoader.load("assets/grass/albedo.jpg"));
  grassAlbedo.colorSpace = THREE.SRGBColorSpace;
  const grassNormal = tile(texLoader.load("assets/grass/normal.jpg"));
  const grassRoughness = tile(texLoader.load("assets/grass/roughness.jpg"));
  const grassAO = tile(texLoader.load("assets/grass/ao.jpg"));

  const fmesh = new THREE.Mesh(
    new THREE.PlaneGeometry(FIELD_W + 24, FIELD_H + 24, 1, 1),
    new THREE.MeshStandardMaterial({
      map: grassAlbedo,
      normalMap: grassNormal,
      roughnessMap: grassRoughness,
      aoMap: grassAO,
      color: 0xc6e7b8, // tint to brighten the grass slightly
      roughness: 1.0,
      metalness: 0.0,
      normalScale: new THREE.Vector2(0.7, 0.7),
    })
  );
  fmesh.rotation.x = -Math.PI / 2;
  fmesh.receiveShadow = true;
  // aoMap requires uv2
  fmesh.geometry.setAttribute("uv2", fmesh.geometry.attributes.uv);
  fieldGroup.add(fmesh);

  // Mowing stripes — overlay alternating darker/lighter strips for stadium look
  const stripeMat = new THREE.MeshStandardMaterial({ color: 0x000000, transparent: true, opacity: 0.10, roughness: 1.0, depthWrite: false });
  const stripeW = (FIELD_W + 20) / 12;
  for (let i = 0; i < 12; i += 2) {
    const sg = new THREE.Mesh(new THREE.PlaneGeometry(stripeW, FIELD_H + 20), stripeMat);
    sg.rotation.x = -Math.PI / 2;
    sg.position.set(-((FIELD_W + 20) / 2) + i * stripeW + stripeW / 2, 0.006, 0);
    sg.receiveShadow = true;
    fieldGroup.add(sg);
  }

  // Field lines decal — bake using existing 2D draw vocabulary into a canvas
  const lc = document.createElement("canvas");
  lc.width = 2048; lc.height = 1024;
  const lcx = lc.getContext("2d");
  const sx = lc.width / FIELD_W, sy = lc.height / FIELD_H;
  lcx.clearRect(0, 0, lc.width, lc.height);
  lcx.strokeStyle = "rgba(255,255,255,0.92)";
  lcx.lineWidth = 0.18 * sx;
  lcx.strokeRect(0, 0, lc.width, lc.height);
  lcx.beginPath();
  lcx.moveTo(lc.width / 2, 0); lcx.lineTo(lc.width / 2, lc.height);
  lcx.stroke();
  lcx.fillStyle = "rgba(255,255,255,0.92)";
  lcx.beginPath(); lcx.arc(lc.width / 2, lc.height / 2, 0.45 * sx, 0, Math.PI * 2); lcx.fill();
  lcx.setLineDash([0.9 * sx, 0.6 * sx]);
  lcx.beginPath();
  lcx.moveTo(0.27 * lc.width, 0); lcx.lineTo(0.27 * lc.width, lc.height);
  lcx.moveTo(0.73 * lc.width, 0); lcx.lineTo(0.73 * lc.width, lc.height);
  lcx.stroke();
  lcx.setLineDash([]);
  lcx.strokeStyle = "rgba(255,255,255,0.85)";
  lcx.beginPath(); lcx.arc(GOAL_X_HOME * sx, 30 * sy, CREASE_R * sx, 0, Math.PI * 2); lcx.stroke();
  lcx.beginPath(); lcx.arc(GOAL_X_AWAY * sx, 30 * sy, CREASE_R * sx, 0, Math.PI * 2); lcx.stroke();
  lcx.fillStyle = "rgba(255,255,255,0.06)";
  lcx.beginPath(); lcx.arc(GOAL_X_HOME * sx, 30 * sy, CREASE_R * sx, 0, Math.PI * 2); lcx.fill();
  lcx.beginPath(); lcx.arc(GOAL_X_AWAY * sx, 30 * sy, CREASE_R * sx, 0, Math.PI * 2); lcx.fill();

  const linesTex = new THREE.CanvasTexture(lc);
  linesTex.colorSpace = THREE.SRGBColorSpace;
  linesTex.anisotropy = 16;
  const linesMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(FIELD_W, FIELD_H),
    new THREE.MeshBasicMaterial({ map: linesTex, transparent: true, depthWrite: false })
  );
  linesMesh.rotation.x = -Math.PI / 2;
  linesMesh.position.y = 0.014;
  fieldGroup.add(linesMesh);
}

// ===== Goal net texture (cross-hatch) =====
function buildNetTexture() {
  const cv = document.createElement("canvas");
  cv.width = cv.height = 256;
  const c = cv.getContext("2d");
  c.clearRect(0, 0, 256, 256);
  c.lineWidth = 2.5;
  c.strokeStyle = "rgba(255,255,255,0.95)";
  for (let i = 0; i <= 256; i += 16) {
    c.beginPath(); c.moveTo(i, 0); c.lineTo(i, 256); c.stroke();
    c.beginPath(); c.moveTo(0, i); c.lineTo(256, i); c.stroke();
  }
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}
const netAlpha = buildNetTexture();

// ===== Goal cages =====
function buildGoal(side) {
  const grp = new THREE.Group();
  const x = side === "home" ? GOAL_X_HOME : GOAL_X_AWAY;
  const sgn = side === "home" ? -1 : 1;
  const pipeMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, metalness: 0.2, roughness: 0.5 });
  const pipeR = 0.15;
  const goalH = 5;
  const goalDepth = 4;
  const postGeo = new THREE.CylinderGeometry(pipeR, pipeR, goalH, 14);
  for (const z of [-GOAL_W / 2, GOAL_W / 2]) {
    const post = new THREE.Mesh(postGeo, pipeMat);
    post.position.set(0, goalH / 2, z);
    post.castShadow = true;
    grp.add(post);
  }
  const bar = new THREE.Mesh(new THREE.CylinderGeometry(pipeR, pipeR, GOAL_W, 14), pipeMat);
  bar.rotation.x = Math.PI / 2;
  bar.position.set(0, goalH, 0);
  bar.castShadow = true;
  grp.add(bar);
  // back legs
  for (const z of [-GOAL_W / 2, GOAL_W / 2]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(pipeR * 0.85, pipeR * 0.85, goalDepth, 10), pipeMat);
    leg.rotation.z = Math.PI / 2;
    leg.position.set(sgn * goalDepth / 2, 0.2, z);
    leg.castShadow = true;
    grp.add(leg);
  }
  // back uprights from top corner to back-floor
  for (const z of [-GOAL_W / 2, GOAL_W / 2]) {
    const v = new THREE.Vector3(sgn * goalDepth - 0, 0.2, z);
    const u = new THREE.Vector3(0, goalH, z);
    const dir = new THREE.Vector3().subVectors(u, v);
    const len = dir.length();
    const cyl = new THREE.Mesh(new THREE.CylinderGeometry(pipeR * 0.85, pipeR * 0.85, len, 10), pipeMat);
    cyl.position.copy(v).addScaledVector(dir, 0.5);
    cyl.lookAt(u);
    cyl.rotateX(Math.PI / 2);
    cyl.castShadow = true;
    grp.add(cyl);
  }
  // Net panels — proper criss-cross alpha texture
  const makeNetMat = (rx, ry) => {
    const t = netAlpha.clone();
    t.needsUpdate = true;
    t.repeat.set(rx, ry);
    return new THREE.MeshStandardMaterial({
      color: 0xffffff,
      alphaMap: t,
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false,
      roughness: 1.0,
      opacity: 0.85,
    });
  };
  const back = new THREE.Mesh(new THREE.PlaneGeometry(GOAL_W, goalH), makeNetMat(GOAL_W * 0.6, goalH * 0.6));
  back.position.set(sgn * goalDepth, goalH / 2, 0);
  back.rotation.y = Math.PI / 2;
  grp.add(back);
  const top = new THREE.Mesh(new THREE.PlaneGeometry(GOAL_W, goalDepth), makeNetMat(GOAL_W * 0.6, goalDepth * 0.6));
  top.position.set(sgn * goalDepth / 2, goalH - 0.05, 0);
  top.rotation.x = Math.PI / 2;
  grp.add(top);
  for (const z of [-GOAL_W / 2, GOAL_W / 2]) {
    const sd = new THREE.Mesh(new THREE.PlaneGeometry(goalDepth, goalH), makeNetMat(goalDepth * 0.6, goalH * 0.6));
    sd.position.set(sgn * goalDepth / 2, goalH / 2, z);
    grp.add(sd);
  }
  grp.position.set(x - FIELD_W / 2, 0, 0);
  scene.add(grp);
  return grp;
}

};
particles.geo.setAttribute("position", new THREE.BufferAttribute(particles.pos, 3));

function emitGoalBurst(side) {
  const x = (side === "home" ? GOAL_X_HOME : GOAL_X_AWAY) - FIELD_W / 2;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const idx = i * 3;
    particles.pos[idx + 0] = x + (Math.random() - 0.5) * 4;
    particles.pos[idx + 1] = 0.8 + Math.random() * 1.5;
    particles.pos[idx + 2] = (Math.random() - 0.5) * GOAL_W * 0.9;
    const speed = 8 + Math.random() * 7;
    const ang = Math.random() * Math.PI * 2;
    const up = 6 + Math.random() * 6;
    particles.vel[idx + 0] = Math.cos(ang) * speed * 0.4 + (side === "home" ? 4 : -4);
    particles.vel[idx + 1] = up;
    particles.vel[idx + 2] = Math.sin(ang) * speed * 0.4;
    // Gold/yellow/white palette
    const k = Math.random();
    if (k < 0.4) { particles.col[idx + 0] = 1.0; particles.col[idx + 1] = 0.86; particles.col[idx + 2] = 0.25; }
    else if (k < 0.75) { particles.col[idx + 0] = 1.0; particles.col[idx + 1] = 1.0; particles.col[idx + 2] = 0.55; }
    else { particles.col[idx + 0] = 1.0; particles.col[idx + 1] = 1.0; particles.col[idx + 2] = 1.0; }
    particles.life[i] = 0;
    particles.ttl[i] = 1.4 + Math.random() * 0.7;
  }
  particles.active = PARTICLE_COUNT;
  particles.geo.attributes.position.needsUpdate = true;
  particles.geo.attributes.color.needsUpdate = true;
}

function updateParticles(dt) {
  if (particles.active === 0) { particlePoints.visible = false; return; }
  particlePoints.visible = true;
  const g = -16; // gravity
  let alive = 0;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    if (particles.life[i] > particles.ttl[i]) continue;
    const idx = i * 3;
    particles.life[i] += dt;
    if (particles.life[i] > particles.ttl[i]) continue;
    particles.vel[idx + 1] += g * dt;
    particles.pos[idx + 0] += particles.vel[idx + 0] * dt;
    particles.pos[idx + 1] += particles.vel[idx + 1] * dt;
    particles.pos[idx + 2] += particles.vel[idx + 2] * dt;
    if (particles.pos[idx + 1] < 0) {
      particles.pos[idx + 1] = 0;
      particles.vel[idx + 1] *= -0.3;
      particles.vel[idx + 0] *= 0.6;
      particles.vel[idx + 2] *= 0.6;
    }
    alive++;
  }
  particles.active = alive;
  particles.geo.attributes.position.needsUpdate = true;
  // Fade out as life approaches ttl (use opacity on material)
  particleMat.opacity = alive / PARTICLE_COUNT;
}

// ===== Player meshes =====
const playerMeshMap = new Map(); // p.id -> { group, body, helm, stick, ring, mixer, actions, charRoot }

function findActionByName(animations, ...names) {
  for (const n of names) {
    const lower = n.toLowerCase();
    const c = animations.find(a => a.name.toLowerCase().includes(lower));
    if (c) return c;
  }
  return null;
}

function buildPlayerMesh(p) {
  const team = state.teams[p.side];
  const grp = new THREE.Group();
  const primary = new THREE.Color(team.primary);
  const secondary = new THREE.Color(team.secondary);

  // ----- Use rigged character if loaded, else capsule fallback -----
  let mixer = null, actions = {}, charRoot = null, body = null;
  if (characterAsset) {
    charRoot = SkeletonUtils.clone(characterAsset.scene);
    // Tint each material toward team primary while preserving original detail
    charRoot.traverse(o => {
      if (o.isMesh || o.isSkinnedMesh) {
        o.castShadow = true;
        o.receiveShadow = true;
        if (o.material) {
          const mats = Array.isArray(o.material) ? o.material : [o.material];
          const newMats = mats.map(m => {
            const nm = m.clone();
            if (nm.color) nm.color.copy(primary);
            nm.metalness = 0.05;
            nm.roughness = 0.7;
            return nm;
          });
          o.material = Array.isArray(o.material) ? newMats : newMats[0];
        }
      }
    });
    // Soldier model: ~1.8u tall by default, faces -Z. Scale to fit our 2.4u player size.
    charRoot.scale.setScalar(1.4);
    charRoot.rotation.y = Math.PI / 2; // face +X (game facing 0)
    grp.add(charRoot);

    // Animation mixer: fade between idle/walk/run by movement speed
    mixer = new THREE.AnimationMixer(charRoot);
    const idleClip = findActionByName(characterAsset.animations, "idle");
    const walkClip = findActionByName(characterAsset.animations, "walk");
    const runClip  = findActionByName(characterAsset.animations, "run");
    if (idleClip) actions.idle = mixer.clipAction(idleClip);
    if (walkClip) actions.walk = mixer.clipAction(walkClip);
    if (runClip)  actions.run  = mixer.clipAction(runClip);
    for (const k in actions) {
      actions[k].play();
      actions[k].setEffectiveWeight(k === "idle" ? 1 : 0);
    }
    if (mixer && actions.idle) mixer.setTime(Math.random() * 1.5);
  } else {
    // Capsule fallback
    body = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.55, 1.4, 6, 12),
      new THREE.MeshStandardMaterial({ color: primary, roughness: 0.55, metalness: 0.05 })
    );
    body.position.y = 1.2;
    body.castShadow = true;
    grp.add(body);
  }

  // Helmet (always added on top) — clamp color so it doesn't blow out under sun
  const helmCol = secondary.clone().multiplyScalar(0.85);
  const helm = new THREE.Mesh(
    new THREE.SphereGeometry(0.32, 16, 12),
    new THREE.MeshStandardMaterial({ color: helmCol, roughness: 0.65, metalness: 0.0 })
  );
  helm.position.y = 2.55;
  helm.castShadow = true;
  grp.add(helm);

  // Visor stripe — matte, no bloom
  const visor = new THREE.Mesh(
    new THREE.TorusGeometry(0.32, 0.05, 6, 24, Math.PI),
    new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5, metalness: 0.1 })
  );
  visor.position.y = 2.52;
  visor.rotation.x = Math.PI / 2;
  visor.rotation.z = -Math.PI / 2;
  grp.add(visor);

  // Stick — parent to right-hand bone if available so it follows the rig
  const stickGrp = new THREE.Group();
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.045, 0.045, 1.9, 8),
    new THREE.MeshStandardMaterial({ color: 0x2a1a10, roughness: 0.85 })
  );
  shaft.rotation.z = -Math.PI / 2;
  shaft.position.set(0.95, 0, 0);
  stickGrp.add(shaft);
  const stickHead = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.36, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.85, metalness: 0.0 })
  );
  stickHead.position.set(2.0, 0, 0);
  stickGrp.add(stickHead);

  let handBone = null;
  if (charRoot) {
    charRoot.traverse(o => {
      if (o.isBone && !handBone) {
        const n = o.name.toLowerCase();
        if (n.includes("righthand") || n.includes("right_hand") || n.endsWith(":righthand") || n === "hand_r") handBone = o;
      }
    });
    // Fallback: any hand bone
    if (!handBone) {
      charRoot.traverse(o => {
        if (o.isBone && !handBone && o.name.toLowerCase().includes("hand")) handBone = o;
      });
    }
  }
  if (handBone) {
    // Stick scale needs to compensate for character scale (1.4) and bone-local space
    stickGrp.scale.setScalar(1.0 / 1.4);
    stickGrp.position.set(0, 0, 0);
    stickGrp.rotation.set(0, 0, 0);
    handBone.add(stickGrp);
  } else {
    // Fallback to floating-in-front position
    stickGrp.position.set(0.5, 1.7, 0);
    grp.add(stickGrp);
  }

  // Ring under feet (controlled-player highlight)
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85, side: THREE.DoubleSide, depthWrite: false });
  const ring = new THREE.Mesh(new THREE.RingGeometry(1.0, 1.4, 32), ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.025;
  ring.visible = false;
  grp.add(ring);

  // Goalies: distinct helmet color, slightly larger
  if (p.role === "G") {
    if (charRoot) charRoot.scale.setScalar(1.55);
    if (body) body.scale.set(1.15, 1.05, 1.15);
    helm.material = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.55, metalness: 0.05 });
  }

  scene.add(grp);
  return { group: grp, body, helm, stick: stickGrp, ring, mixer, actions, charRoot };
}

function rebuildPlayerMeshes() {
  for (const m of playerMeshMap.values()) {
    scene.remove(m.group);
    m.group.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        if (Array.isArray(o.material)) o.material.forEach(mt => mt.dispose());
        else o.material.dispose();
      }
    });
  }
  playerMeshMap.clear();
  for (const p of state.players) playerMeshMap.set(p.id, buildPlayerMesh(p));
}

// ===== Match init =====
function startMatch(homeIdx, awayIdx) {
  state.teams.home = TEAMS[homeIdx];
  state.teams.away = TEAMS[awayIdx];
  state.score = { home: 0, away: 0 };
  state.scorers = {};
  state.clock = MATCH_TIME;
  state.players = [...buildRoster("home"), ...buildRoster("away")];
  rebuildPlayerMeshes();
  resetForFaceoff();
  document.getElementById("menu").hidden = true;
  document.getElementById("result").hidden = true;
  const hud = document.getElementById("hud");
  hud.hidden = false;
  document.querySelector("#hudHome .swatch").style.background = state.teams.home.primary;
  document.querySelector("#hudHome .name").textContent = state.teams.home.name;
  document.querySelector("#hudAway .swatch").style.background = state.teams.away.primary;
  document.querySelector("#hudAway .name").textContent = state.teams.away.name;
  updateHud();
}

function buildRoster(side) {
  const isHome = side === "home";
  const sx = (x) => isHome ? x : FIELD_W - x;
  const sy = (y) => y;
  const positions = [
    { role: "G", x: sx(GOAL_X_HOME),  y: 30 },
    { role: "D", x: sx(15), y: 18 },
    { role: "D", x: sx(15), y: 30 },
    { role: "D", x: sx(15), y: 42 },
    { role: "M", x: sx(40), y: 18 },
    { role: "M", x: sx(45), y: 30 },
    { role: "M", x: sx(40), y: 42 },
    { role: "A", x: sx(80), y: 22 },
    { role: "A", x: sx(85), y: 30 },
    { role: "A", x: sx(80), y: 38 },
  ];
  return positions.map((p, i) => ({
    id: side + "-" + i,
    side, role: p.role, idx: i,
    x: p.x, y: sy(p.y),
    vx: 0, vy: 0,
    home: { x: p.x, y: sy(p.y) },
    facing: isHome ? 0 : Math.PI,
    cooldown: 0,
  }));
}

function resetForFaceoff() {
  for (const p of state.players) { p.x = p.home.x; p.y = p.home.y; p.vx = 0; p.vy = 0; p.cooldown = 0; }
  state.ball.x = FIELD_W / 2;
  state.ball.y = FIELD_H / 2;
  state.ball.z = 1.5;
  state.ball.vx = 0; state.ball.vy = 0; state.ball.vz = 0;
  state.ball.carrier = null;
  state.ball.lastTouch = null;
  state.ball.lastShooter = null;
  state.ball.pickupCooldown = 0;
  state.ball.trail.length = 0;
  // sync to Rapier
  if (state.ball.body) {
    state.ball.body.setBodyType(RAPIER.RigidBodyType.Dynamic, true);
    state.ball.body.setTranslation({ x: 0, y: 1.5, z: 0 }, true);
    state.ball.body.setLinvel({ x: 0, y: 0, z: 0 }, true);
    state.ball.body.setAngvel({ x: 0, y: 0, z: 0 }, true);
  }
  state.phase = "ready";
  state.readyTimer = 1.4;
  sfxWhistle();
}

const keys = {};
addEventListener("keydown", e => {
  if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
  if (!keys[e.code]) {
    if (e.code === "Space") state.input.shootEdge = true;
    if (e.code === "ShiftLeft" || e.code === "ShiftRight" || e.code === "KeyJ") state.input.passEdge = true;
  }
  keys[e.code] = true;
  if (e.code === "KeyP" && state.phase === "play") state.paused = !state.paused;
  if (e.code === "Escape" && state.phase !== "menu") {
    document.getElementById("hud").hidden = true;
    document.getElementById("result").hidden = true;
    document.getElementById("menu").hidden = false;
    state.phase = "menu";
  }
});
addEventListener("keyup", e => { keys[e.code] = false; });

stickArea.addEventListener("pointerdown", e => {
  showTouchUI();
  touchInput.active = true; touchInput.id = e.pointerId;
  touchInput.ox = e.clientX; touchInput.oy = e.clientY;
  stickBase.style.left = e.clientX + "px"; stickBase.style.top = e.clientY + "px"; stickBase.style.display = "block";
  stickKnob.style.left = e.clientX + "px"; stickKnob.style.top = e.clientY + "px"; stickKnob.style.display = "block";
  stickArea.setPointerCapture(e.pointerId);
});
stickArea.addEventListener("pointermove", e => {
  if (!touchInput.active || e.pointerId !== touchInput.id) return;
  const dx = e.clientX - touchInput.ox;
  const dy = e.clientY - touchInput.oy;
  const max = 50;
  const m = Math.hypot(dx, dy);
  const cl = m > max ? max / m : 1;
  touchInput.dx = dx * cl;
  touchInput.dy = dy * cl;
  stickKnob.style.left = (touchInput.ox + touchInput.dx) + "px";
  stickKnob.style.top  = (touchInput.oy + touchInput.dy) + "px";
});
function endTouch(e) {
  if (e.pointerId !== touchInput.id) return;
  touchInput.active = false; touchInput.dx = 0; touchInput.dy = 0;
  stickBase.style.display = "none"; stickKnob.style.display = "none";
}
stickArea.addEventListener("pointerup", endTouch);
stickArea.addEventListener("pointercancel", endTouch);

let touchShoot = false, touchPass = false, touchShootEdge = false, touchPassEdge = false;
function bindActionBtn(id, downCb, upCb) {
  const el = document.getElementById(id);
  const onDown = (e) => { e.preventDefault(); showTouchUI(); downCb(); };
  const onUp   = (e) => { e.preventDefault(); upCb(); };
  el.addEventListener("pointerdown", onDown);
  el.addEventListener("pointerup", onUp);
  el.addEventListener("pointercancel", onUp);
  el.addEventListener("pointerleave", onUp);
}
bindActionBtn("shootBtn", () => { if (!touchShoot) touchShootEdge = true; touchShoot = true; }, () => { touchShoot = false; });
bindActionBtn("passBtn",  () => { if (!touchPass)  touchPassEdge  = true; touchPass  = true; }, () => { touchPass  = false; });

function readInput() {
  let ax = 0, ay = 0;
  if (keys.KeyW || keys.ArrowUp) ay -= 1;
  if (keys.KeyS || keys.ArrowDown) ay += 1;
  if (keys.KeyA || keys.ArrowLeft) ax -= 1;
  if (keys.KeyD || keys.ArrowRight) ax += 1;
  const km = Math.hypot(ax, ay);
  if (km > 0) { ax /= km; ay /= km; }
  if (touchInput.active) {
    const tm = Math.hypot(touchInput.dx, touchInput.dy);
    if (tm > 8) {
      ax = touchInput.dx / 50;
      ay = touchInput.dy / 50;
      const m = Math.hypot(ax, ay);
      if (m > 1) { ax /= m; ay /= m; }
    }
  }
  state.input.ax = ax;
  state.input.ay = ay;
  state.input.shoot = !!keys.Space || touchShoot;
  state.input.pass  = !!(keys.ShiftLeft || keys.ShiftRight || keys.KeyJ) || touchPass;
  if (touchShootEdge) { state.input.shootEdge = true; touchShootEdge = false; }
  if (touchPassEdge)  { state.input.passEdge  = true; touchPassEdge  = false; }
}

// ===== Auto-switch =====
function resolveControlled() {
  const ball = state.ball;
  if (ball.carrier && ball.carrier.side === "home" && ball.carrier.role !== "G") return ball.carrier;
  // candidate: closest non-goalie home player to ball
  let best = null, bd = Infinity;
  for (const p of state.players) {
    if (p.side !== "home" || p.role === "G") continue;
    const d = Math.hypot(p.x - ball.x, p.y - ball.y);
    if (d < bd) { bd = d; best = p; }
  }
  // hysteresis: stick with current controlled unless candidate is meaningfully closer
  const cur = state.controlled;
  if (cur && cur.side === "home" && cur.role !== "G" && cur !== ball.carrier) {
    const curDist = Math.hypot(cur.x - ball.x, cur.y - ball.y);
    if (best && best !== cur && bd < curDist * 0.7) return best;
    return cur;
  }
  return best;
}

// ===== AI =====
function teamStat(p, key) { return state.teams[p.side][key]; }

function attackingGoalX(side) { return side === "home" ? GOAL_X_AWAY : GOAL_X_HOME; }
function defendingGoalX(side) { return side === "home" ? GOAL_X_HOME : GOAL_X_AWAY; }

function aiMove(p, dt) {
  const ball = state.ball;
  const ownTeamHasBall = ball.carrier && ball.carrier.side === p.side;
  const opponentHasBall = ball.carrier && ball.carrier.side !== p.side;
  const looseBall = !ball.carrier;
  const targetGoalX = attackingGoalX(p.side);

  let tx = p.home.x, ty = p.home.y;
  let speed = BASE_SPEED * teamStat(p, "speed") * 0.85;

  if (p.role === "G") {
    aiGoalie(p, dt);
    return;
  }

  if (ownTeamHasBall) {
    if (ball.carrier === p) {
      tx = targetGoalX + (p.side === "home" ? -8 : 8);
      ty = 30 + Math.sin(performance.now() / 500 + p.idx) * 10;
      speed = BASE_SPEED * teamStat(p, "speed") * CARRIER_SPEED_MULT;
      const dx = targetGoalX - p.x, dy = 30 - p.y;
      const dist = Math.hypot(dx, dy);
      if (p.cooldown <= 0) {
        const opp = nearestOpponent(p, 4);
        const goalLane = dist < 32 && Math.abs(p.y - 30) < 18;
        if (goalLane && (dist < 22 || Math.random() < 0.012)) {
          shoot(p);
        } else if (opp && Math.random() < 0.04) {
          passToBest(p);
        }
      }
    } else {
      // off-ball positioning by role
      const goalDir = p.side === "home" ? 1 : -1;
      if (p.role === "A") {
        tx = targetGoalX + (-goalDir) * (10 + (p.idx % 3) * 4);
        ty = [18, 30, 42][p.idx - 7];
      } else if (p.role === "M") {
        tx = FIELD_W/2 + goalDir * 18;
        ty = [18, 30, 42][p.idx - 4];
      } else {
        tx = p.home.x + goalDir * 6;
        ty = p.home.y;
      }
      speed = BASE_SPEED * teamStat(p, "speed") * 0.78;
    }
  } else if (opponentHasBall) {
    if (p.role === "D" || (p.role === "M" && distance(p, ball.carrier) < 14)) {
      const closestD = isClosestDefender(p);
      if (closestD) {
        tx = ball.carrier.x; ty = ball.carrier.y;
        speed = BASE_SPEED * teamStat(p, "speed") * 0.95;
        if (distance(p, ball.carrier) < CHECK_RANGE && p.cooldown <= 0 && Math.random() < 0.05) {
          check(p, ball.carrier);
        }
      } else {
        const mark = findMark(p);
        if (mark) { tx = (mark.x + ball.carrier.x) / 2; ty = (mark.y + ball.carrier.y) / 2; }
      }
    } else if (p.role === "M") {
      const mark = findMark(p);
      if (mark) { tx = mark.x; ty = mark.y; }
    } else {
      // attackers retreat to midfield
      tx = FIELD_W/2 + (p.side === "home" ? -8 : 8);
      ty = p.home.y;
    }
  } else if (looseBall) {
    if (isClosestToBall(p)) {
      tx = ball.x; ty = ball.y;
      speed = BASE_SPEED * teamStat(p, "speed");
    } else {
      tx = (p.home.x + ball.x) / 2;
      ty = (p.home.y + ball.y) / 2;
      speed = BASE_SPEED * teamStat(p, "speed") * 0.7;
    }
  }

  // ready phase: midfielders charge center
  if (state.phase === "ready" && p.role === "M" && Math.abs(p.home.x - FIELD_W/2) < 12) {
    tx = FIELD_W/2; ty = 30;
    speed = BASE_SPEED * teamStat(p, "speed");
  }

  steer(p, tx, ty, speed, dt);
}

function aiGoalie(p, dt) {
  const ball = state.ball;
  const goalX = defendingGoalX(p.side);
  let ty = 30;
  // anticipate: if ball coming toward goal, project intercept
  if (!ball.carrier) {
    const towardUs = (p.side === "home" && ball.vx < -2) || (p.side === "away" && ball.vx > 2);
    if (towardUs) {
      const t = (goalX - ball.x) / ball.vx;
      if (t > 0 && t < 1.2) ty = clamp(ball.y + ball.vy * t, GOAL_Y1 + 0.5, GOAL_Y2 - 0.5);
    }
  } else {
    ty = clamp(ball.y, GOAL_Y1 + 0.5, GOAL_Y2 - 0.5);
  }
  const tx = goalX;
  steer(p, tx, ty, BASE_SPEED * 0.9, dt);
  if (ball.carrier === p) {
    p.holdTime = (p.holdTime || 0) + dt;
    if (p.cooldown <= 0 && p.holdTime > 0.6) { passToBest(p); p.holdTime = 0; }
  } else {
    p.holdTime = 0;
  }
}

function steer(p, tx, ty, speed, dt) {
  const dx = tx - p.x, dy = ty - p.y;
  const d = Math.hypot(dx, dy);
  if (d < 0.05) { p.vx *= 0.6; p.vy *= 0.6; return; }
  const desiredVx = (dx / d) * speed;
  const desiredVy = (dy / d) * speed;
  // smoothing
  const lerp = Math.min(1, dt * 8);
  p.vx += (desiredVx - p.vx) * lerp;
  p.vy += (desiredVy - p.vy) * lerp;
  if (Math.hypot(p.vx, p.vy) > 0.5) p.facing = Math.atan2(p.vy, p.vx);
}

function distance(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function isClosestToBall(p) {
  const ball = state.ball;
  for (const q of state.players) {
    if (q === p || q.role === "G") continue;
    if (distance(q, ball) < distance(p, ball) - 0.01) return false;
  }
  return true;
}
function isClosestDefender(p) {
  const ball = state.ball;
  for (const q of state.players) {
    if (q === p || q.side !== p.side || q.role === "G") continue;
    if (distance(q, ball) < distance(p, ball) - 0.01) return false;
  }
  return true;
}
function nearestOpponent(p, maxDist) {
  let best = null, bd = maxDist != null ? maxDist : Infinity;
  for (const q of state.players) {
    if (q.side === p.side) continue;
    const d = distance(p, q);
    if (d < bd) { bd = d; best = q; }
  }
  return best;
}
function findMark(p) {
  // assign opponent of same role nearest to p
  let best = null, bd = Infinity;
  for (const q of state.players) {
    if (q.side === p.side || q.role === "G") continue;
    const d = distance(p, q);
    if (d < bd) { bd = d; best = q; }
  }
  return best;
}

// ===== Player actions =====
function shoot(p) {
  if (state.ball.carrier !== p) return;
  const goalX = attackingGoalX(p.side);
  const goalY = clamp(30 + (Math.random() - 0.5) * (GOAL_W - 1.5), GOAL_Y1 + 0.5, GOAL_Y2 - 0.5);
  const dx = goalX - p.x, dy = goalY - p.y;
  const m = Math.hypot(dx, dy) || 1;
  const accuracy = teamStat(p, "shoot");
  const jitter = (1 - Math.min(1, accuracy)) * 4 + 1.0;
  const jx = (Math.random() - 0.5) * jitter;
  const jy = (Math.random() - 0.5) * jitter;
  const sp = SHOOT_SPEED * accuracy;
  const vxGame = (dx / m) * sp + jx;
  const vyGame = (dy / m) * sp + jy;
  // Upward arc: closer shots are flatter, longer shots loft
  const vzUp = Math.min(8, 3.5 + m * 0.05) + (Math.random() - 0.5) * 1.0;

  state.ball.vx = vxGame;
  state.ball.vy = vyGame;
  state.ball.vz = vzUp;
  // Push to Rapier
  const b = state.ball;
  b.body.setBodyType(RAPIER.RigidBodyType.Dynamic, true);
  // Position the ball just in front of the player at stick height
  const stickX = p.x + Math.cos(p.facing) * 1.6;
  const stickY = p.y + Math.sin(p.facing) * 1.6;
  b.body.setTranslation({ x: stickX - FIELD_W / 2, y: 1.7, z: stickY - FIELD_H / 2 }, true);
  b.body.setLinvel({ x: vxGame, y: vzUp, z: vyGame }, true);
  b.body.setAngvel({ x: vyGame * 0.3, y: 0, z: -vxGame * 0.3 }, true);

  b.carrier = null;
  b.lastTouch = p;
  b.lastShooter = p;
  b.pickupCooldown = PICKUP_COOLDOWN;
  p.cooldown = ACTION_COOLDOWN;
  p.actionAnim = { type: "shoot", t: 0.0 };
  sfxShoot();
  showToast(p.side === "home" ? "SHOT!" : "");
}

function pass(p) {
  if (state.ball.carrier !== p) return;
  passToBest(p);
}

function passToBest(p) {
  // find nearest teammate forward toward attacking goal
  const goalX = attackingGoalX(p.side);
  const dirSign = p.side === "home" ? 1 : -1;
  let best = null, bs = -Infinity;
  for (const q of state.players) {
    if (q === p || q.side !== p.side || q.role === "G") continue;
    const forward = (q.x - p.x) * dirSign;
    const dist = distance(p, q);
    if (dist < 4 || dist > 45) continue;
    const score = forward - dist * 0.3;
    if (score > bs) { bs = score; best = q; }
  }
  if (!best) {
    // fallback: any teammate
    for (const q of state.players) {
      if (q === p || q.side !== p.side) continue;
      const dist = distance(p, q);
      const score = -dist;
      if (score > bs) { bs = score; best = q; }
    }
  }
  if (!best) return;
  const dx = best.x - p.x, dy = best.y - p.y;
  const m = Math.hypot(dx, dy) || 1;
  const vxGame = (dx / m) * PASS_SPEED;
  const vyGame = (dy / m) * PASS_SPEED;
  // Slight loft so passes arc visibly
  const vzUp = 3.0 + m * 0.06;

  state.ball.vx = vxGame;
  state.ball.vy = vyGame;
  state.ball.vz = vzUp;
  const b = state.ball;
  b.body.setBodyType(RAPIER.RigidBodyType.Dynamic, true);
  const stickX = p.x + Math.cos(p.facing) * 1.6;
  const stickY = p.y + Math.sin(p.facing) * 1.6;
  b.body.setTranslation({ x: stickX - FIELD_W / 2, y: 1.7, z: stickY - FIELD_H / 2 }, true);
  b.body.setLinvel({ x: vxGame, y: vzUp, z: vyGame }, true);
  b.body.setAngvel({ x: vyGame * 0.25, y: 0, z: -vxGame * 0.25 }, true);

  b.carrier = null;
  b.lastTouch = p;
  b.lastShooter = null;
  b.pickupCooldown = PICKUP_COOLDOWN * 0.7;
  p.cooldown = ACTION_COOLDOWN * 0.7;
  p.actionAnim = { type: "pass", t: 0.0 };
  sfxPass();
}

function check(p, target) {
  if (state.ball.carrier !== target) return;
  if (distance(p, target) > CHECK_RANGE) return;
  const success = Math.random() < 0.5 * teamStat(p, "defense") / teamStat(target, "shoot");
  p.cooldown = ACTION_COOLDOWN;
  p.actionAnim = { type: "check", t: 0.0 };
  sfxCheck();
  if (success) {
    // dislodge ball
    const dx = state.ball.x - target.x, dy = state.ball.y - target.y;
    const m = Math.hypot(dx, dy) || 1;
    const vxGame = (dx / m) * 14 + (Math.random() - 0.5) * 8;
    const vyGame = (dy / m) * 14 + (Math.random() - 0.5) * 8;
    state.ball.vx = vxGame;
    state.ball.vy = vyGame;
    state.ball.vz = 3 + Math.random() * 2;
    const b = state.ball;
    b.body.setBodyType(RAPIER.RigidBodyType.Dynamic, true);
    b.body.setTranslation({ x: target.x - FIELD_W / 2, y: 1.5, z: target.y - FIELD_H / 2 }, true);
    b.body.setLinvel({ x: vxGame, y: state.ball.vz, z: vyGame }, true);
    b.body.setAngvel({ x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8, z: (Math.random() - 0.5) * 8 }, true);

    b.carrier = null;
    b.lastTouch = p;
    b.pickupCooldown = PICKUP_COOLDOWN;
    target.cooldown = ACTION_COOLDOWN * 0.6;
  }
}

// ===== Update =====
function update(dt) {
  if (state.phase === "menu" || state.phase === "end") return;
  if (state.paused) return;

  readInput();
  state.controlled = resolveControlled();

  if (state.phase === "ready") {
    state.readyTimer -= dt;
    if (state.readyTimer <= 0) state.phase = "play";
  }
  if (state.phase === "goal") {
    state.goalTimer -= dt;
    if (state.goalTimer <= 0) resetForFaceoff();
  }
  if (state.phase === "play") {
    state.clock -= dt;
    if (state.clock <= 0) { state.clock = 0; endMatch(); }
  }

  // AI + player
  const inp = state.input;
  for (const p of state.players) {
    p.cooldown = Math.max(0, p.cooldown - dt);
    if (p === state.controlled && state.phase !== "goal") {
      const speed = BASE_SPEED * teamStat(p, "speed") * (state.ball.carrier === p ? CARRIER_SPEED_MULT : 1.0);
      const targetVx = inp.ax * speed;
      const targetVy = inp.ay * speed;
      const lerp = Math.min(1, dt * 14);
      p.vx += (targetVx - p.vx) * lerp;
      p.vy += (targetVy - p.vy) * lerp;
      if (Math.hypot(inp.ax, inp.ay) > 0.05) p.facing = Math.atan2(inp.ay, inp.ax);
      if (p.cooldown <= 0) {
        if (state.ball.carrier === p) {
          if (inp.shootEdge) { shoot(p); }
          else if (inp.passEdge) { pass(p); }
        } else if (inp.shootEdge && state.ball.carrier && state.ball.carrier.side !== p.side) {
          if (distance(p, state.ball.carrier) < CHECK_RANGE) check(p, state.ball.carrier);
        }
      }
    } else {
      aiMove(p, dt);
    }
  }
  inp.shootEdge = false;
  inp.passEdge = false;

  // Move players
  for (const p of state.players) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    // bounds
    p.x = clamp(p.x, PLAYER_R, FIELD_W - PLAYER_R);
    p.y = clamp(p.y, PLAYER_R, FIELD_H - PLAYER_R);
    // crease constraint: only goalie inside crease
    if (p.role !== "G") {
      enforceOutsideCrease(p, GOAL_X_HOME, 30);
      enforceOutsideCrease(p, GOAL_X_AWAY, 30);
    } else {
      // goalie stays near own crease
      const cx = defendingGoalX(p.side);
      const dx = p.x - cx, dy = p.y - 30;
      const r = Math.hypot(dx, dy);
      if (r > CREASE_R - 0.5) {
        const k = (CREASE_R - 0.5) / r;
        p.x = cx + dx * k; p.y = 30 + dy * k;
      }
    }
  }
  // separation
  for (let i = 0; i < state.players.length; i++) {
    for (let j = i + 1; j < state.players.length; j++) {
      const a = state.players[i], b = state.players[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy);
      const minD = PLAYER_R * 2;
      if (d > 0 && d < minD) {
        const push = (minD - d) / 2;
        const nx = dx / d, ny = dy / d;
        a.x -= nx * push; a.y -= ny * push;
        b.x += nx * push; b.y += ny * push;
      }
    }
  }

  updateBall(dt);
  if (state.phase === "play") checkGoal();
  updateHud();
}

function enforceOutsideCrease(p, cx, cy) {
  const dx = p.x - cx, dy = p.y - cy;
  const r = Math.hypot(dx, dy);
  const min = CREASE_R + PLAYER_R * 0.3;
  if (r < min && r > 0) {
    const k = min / r;
    p.x = cx + dx * k; p.y = cy + dy * k;
  } else if (r === 0) {
    p.x = cx + min; p.y = cy;
  }
}

function updateBall(dt) {
  const b = state.ball;
  b.pickupCooldown = Math.max(0, b.pickupCooldown - dt);

  if (b.carrier) {
    // Pin ball to carrier's stick head, kinematic
    const bt = b.body.bodyType();
    if (bt !== RAPIER.RigidBodyType.KinematicPositionBased) {
      b.body.setBodyType(RAPIER.RigidBodyType.KinematicPositionBased, true);
    }
    const off = PLAYER_R + BALL_R;
    const stickX = b.carrier.x + Math.cos(b.carrier.facing) * off * 0.9;
    const stickY = b.carrier.y + Math.sin(b.carrier.facing) * off * 0.9;
    const carryHeight = 1.7;
    b.body.setNextKinematicTranslation({
      x: stickX - FIELD_W / 2,
      y: carryHeight,
      z: stickY - FIELD_H / 2,
    });
    b.x = stickX; b.y = stickY; b.z = carryHeight;
    b.vx = b.carrier.vx; b.vy = b.carrier.vy; b.vz = 0;
    b.trail.length = 0;
  } else {
    const bt = b.body.bodyType();
    if (bt !== RAPIER.RigidBodyType.Dynamic) {
      b.body.setBodyType(RAPIER.RigidBodyType.Dynamic, true);
    }
  }

  // Step physics world
  world.step();

  // Sync from Rapier into game-space
  if (!b.carrier) {
    const t = b.body.translation();
    const v = b.body.linvel();
    b.x = t.x + FIELD_W / 2;
    b.y = t.z + FIELD_H / 2;
    b.z = t.y;
    b.vx = v.x;
    b.vy = v.z;
    b.vz = v.y;
    // Soft sideline clamp (physics walls handle it but be safe with positions)
    b.x = clamp(b.x, BALL_R, FIELD_W - BALL_R);
    b.y = clamp(b.y, BALL_R, FIELD_H - BALL_R);

    // Trail
    const sp = Math.hypot(b.vx, b.vy);
    if (sp > 6) {
      b.trail.push({ x: b.x, y: b.y, z: b.z });
      if (b.trail.length > 10) b.trail.shift();
    } else if (b.trail.length) {
      b.trail.shift();
    }

    // Pickup — only when ball is near ground (carry height = 1.7)
    if (b.pickupCooldown <= 0 && b.z < 2.2) {
      let best = null, bd = PICKUP_RANGE;
      for (const p of state.players) {
        const d = Math.hypot(p.x - b.x, p.y - b.y);
        if (d < bd) { bd = d; best = p; }
      }
      if (best) {
        b.carrier = best;
        b.lastTouch = best;
        best.cooldown = Math.max(best.cooldown, 0.2);
        b.lastShooter = null;
      }
    }
  }
}

function checkGoal() {
  const b = state.ball;
  if (b.carrier) return;
  // 3D: must be under the crossbar (y < 4.8) and above ground
  if (b.z > 4.8 || b.z < 0) return;
  if (b.x <= GOAL_X_HOME && b.y > GOAL_Y1 && b.y < GOAL_Y2 && b.vx <= 0) {
    scoreGoal("away");
  } else if (b.x >= GOAL_X_AWAY && b.y > GOAL_Y1 && b.y < GOAL_Y2 && b.vx >= 0) {
    scoreGoal("home");
  }
}

function scoreGoal(side) {
  state.score[side]++;
  state.phase = "goal";
  state.goalTimer = 2.0;
  const scorer = state.ball.lastShooter || state.ball.lastTouch;
  if (scorer && scorer.side === side) {
    state.scorers[scorer.id] = (state.scorers[scorer.id] || 0) + 1;
  }
  sfxGoalHorn();
  showToast("GOAL — " + state.teams[side].name.toUpperCase());
  // Visual celebration: particles + camera shake
  emitGoalBurst(side);
  camShake = 0.7;
  updateHud();
}

function endMatch() {
  state.phase = "end";
  const r = document.getElementById("result");
  r.hidden = false;
  document.getElementById("resultScore").textContent = state.score.home + " : " + state.score.away;
  let winText;
  if (state.score.home > state.score.away) winText = state.teams.home.name + " win!";
  else if (state.score.away > state.score.home) winText = state.teams.away.name + " win!";
  else winText = "Draw";
  document.getElementById("resultText").textContent = winText;
  // mvp
  let mvpId = null, mvpGoals = 0;
  for (const id in state.scorers) {
    if (state.scorers[id] > mvpGoals) { mvpGoals = state.scorers[id]; mvpId = id; }
  }
  if (mvpId) {
    const p = state.players.find(p => p.id === mvpId);
    document.getElementById("resultMvp").textContent = "MVP: " + state.teams[p.side].name + " " + roleName(p.role) + " #" + (p.idx + 1) + " — " + mvpGoals + " goal" + (mvpGoals > 1 ? "s" : "");
  } else {
    document.getElementById("resultMvp").textContent = "No goals scored";
  }
}

function roleName(r) { return { A: "Attack", M: "Midfielder", D: "Defender", G: "Goalie" }[r]; }

function updateHud() {
  document.getElementById("scoreHome").textContent = state.score.home;
  document.getElementById("scoreAway").textContent = state.score.away;
  const m = Math.floor(state.clock / 60);
  const s = Math.floor(state.clock % 60);
  document.getElementById("clock").textContent = m + ":" + (s < 10 ? "0" : "") + s;
}

// ===== Toast =====
const toastEl = document.getElementById("toast");
let toastTimer = 0;
function showToast(t) {
  if (!t) return;
  toastEl.textContent = t;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1400);
}

// ===== Audio (synthesized via Web Audio — no asset deps) =====
let audioCtx = null;
function ensureAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
}
addEventListener("pointerdown", ensureAudio, { once: true });
addEventListener("keydown", ensureAudio, { once: true });

function playTone({ freq = 440, dur = 0.2, type = "sine", attack = 0.005, release = 0.05, gain = 0.3, sweep = 0, vibrato = 0 }) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (sweep) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq * sweep), t0 + dur);
  if (vibrato) {
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 8;
    lfoGain.gain.value = freq * vibrato;
    lfo.connect(lfoGain).connect(osc.frequency);
    lfo.start(t0); lfo.stop(t0 + dur);
  }
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(gain, t0 + attack);
  g.gain.setValueAtTime(gain, t0 + dur - release);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + dur);
}
function playNoise(dur = 0.1, gain = 0.3, lpFreq = 4000) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = lpFreq;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  src.connect(filter).connect(g).connect(audioCtx.destination);
  src.start(t0);
}
function sfxWhistle() {
  ensureAudio();
  playTone({ freq: 1800, dur: 0.4, type: "sine", attack: 0.02, release: 0.1, gain: 0.18, vibrato: 0.012 });
}
function sfxGoalHorn() {
  ensureAudio();
  // Two-tone air horn
  playTone({ freq: 220, dur: 0.55, type: "sawtooth", attack: 0.01, release: 0.15, gain: 0.18 });
  setTimeout(() => playTone({ freq: 165, dur: 0.7, type: "sawtooth", attack: 0.01, release: 0.18, gain: 0.18 }), 550);
}
function sfxShoot() {
  ensureAudio();
  playNoise(0.06, 0.18, 2200);
  playTone({ freq: 360, dur: 0.08, type: "triangle", gain: 0.12, sweep: 0.5 });
}
function sfxPass() {
  ensureAudio();
  playNoise(0.04, 0.10, 3000);
}
function sfxCheck() {
  ensureAudio();
  playNoise(0.12, 0.25, 1400);
}

// ===== Center text overlay (HTML, since canvas is now WebGL) =====
const centerEl = document.createElement("div");
centerEl.id = "centerText";
centerEl.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:800;font-size:clamp(36px,7vw,72px);letter-spacing:6px;text-shadow:0 4px 14px rgba(0,0,0,.7);pointer-events:none;z-index:6;opacity:0;transition:opacity .25s;";
document.body.appendChild(centerEl);
function setCenterText(t, color) {
  if (!t) { centerEl.style.opacity = "0"; return; }
  centerEl.textContent = t;
  centerEl.style.color = color || "#fff";
  centerEl.style.opacity = "1";
}

// ===== Renderer3D: sync state -> meshes; animate camera; render =====
function syncScene(dt) {
  // Players
  for (const p of state.players) {
    const m = playerMeshMap.get(p.id);
    if (!m) continue;
    m.group.position.set(p.x - FIELD_W / 2, 0, p.y - FIELD_H / 2);
    m.group.rotation.y = -p.facing;
    m.ring.visible = (p === state.controlled);
    if (m.ring.visible) {
      m.ring.material.opacity = 0.55 + 0.3 * (Math.sin(performance.now() / 220) * 0.5 + 0.5);
    }

    // Animation: blend idle/walk/run by speed
    if (m.mixer) {
      const sp = Math.hypot(p.vx, p.vy);
      const norm = Math.min(1, sp / (BASE_SPEED * 1.05));
      // weights
      let wIdle, wWalk, wRun;
      if (norm < 0.05) { wIdle = 1; wWalk = 0; wRun = 0; }
      else if (norm < 0.5) { wRun = 0; wWalk = norm / 0.5; wIdle = 1 - wWalk; }
      else { wIdle = 0; wRun = (norm - 0.5) / 0.5; wWalk = 1 - wRun; }
      if (m.actions.idle) m.actions.idle.setEffectiveWeight(wIdle);
      if (m.actions.walk) m.actions.walk.setEffectiveWeight(wWalk);
      if (m.actions.run)  m.actions.run.setEffectiveWeight(wRun);
      // Speed up animation slightly when sprinting
      if (m.actions.run) m.actions.run.setEffectiveTimeScale(0.9 + norm * 0.4);
      m.mixer.update(dt);
    }

    // Action overlay (tilt stick on shoot/pass/check)
    if (p.actionAnim) {
      p.actionAnim.t += dt;
      const a = Math.min(1, p.actionAnim.t / 0.35);
      const fade = a < 0.5 ? a * 2 : (1 - (a - 0.5) * 2);
      m.stick.rotation.z = -fade * 0.9;
      if (p.actionAnim.t > 0.45) { p.actionAnim = null; m.stick.rotation.z = 0; }
    }
  }

  // Ball
  const b = state.ball;
  const by = Math.max(BALL_R, b.z);
  ballMesh.position.set(b.x - FIELD_W / 2, by, b.y - FIELD_H / 2);
  ballMesh.rotation.x += (b.vy) * dt * 0.3;
  ballMesh.rotation.z -= (b.vx) * dt * 0.3;
  ballLight.position.set(b.x - FIELD_W / 2, by + 0.5, b.y - FIELD_H / 2);

  // Trail
  for (let i = 0; i < TRAIL_LEN; i++) {
    const tm = trailMeshes[i];
    if (i < b.trail.length) {
      const t = b.trail[i];
      tm.visible = true;
      tm.position.set(t.x - FIELD_W / 2, Math.max(BALL_R, t.z || BALL_R), t.y - FIELD_H / 2);
      const a = (i + 1) / b.trail.length;
      tm.material.opacity = a * 0.55;
      tm.scale.setScalar(0.4 + a * 0.7);
    } else {
      tm.visible = false;
    }
  }

  // Center text overlays
  if (state.phase === "ready") setCenterText("FACEOFF", "#ffffff");
  else if (state.phase === "goal") setCenterText("GOAL!", "#ffdc50");
  else if (state.paused) setCenterText("PAUSED", "#ffffff");
  else setCenterText(null);
}

let camShake = 0; // decays over time after a goal/big check
function updateCamera(dt) {
  let tcx, tcy, tcz, tlx, tly, tlz;
  const broadcast = state.phase === "menu" || state.phase === "ready" || state.phase === "goal" || state.phase === "end";

  if (broadcast || !state.controlled) {
    // Cinematic broadcast: lower angle, pulled back
    tcx = 0; tcy = 36; tcz = 78;
    tlx = 0; tly = 2; tlz = 0;
  } else {
    const c = state.controlled;
    let dirX = Math.cos(c.facing);
    let dirZ = Math.sin(c.facing);
    const attackDirX = c.side === "home" ? 1 : -1;
    const blend = 0.45;
    dirX = dirX * (1 - blend) + attackDirX * blend;
    const m = Math.hypot(dirX, dirZ) || 1;
    dirX /= m; dirZ /= m;

    const px = c.x - FIELD_W / 2;
    const pz = c.y - FIELD_H / 2;
    tcx = px - dirX * 14;
    tcy = 8;
    tcz = pz - dirZ * 14;
    tlx = px + dirX * 6;
    tly = 1.8;
    tlz = pz + dirZ * 6;
  }

  const k = 1 - Math.exp(-dt * 3.5);
  camera.position.x += (tcx - camera.position.x) * k;
  camera.position.y += (tcy - camera.position.y) * k;
  camera.position.z += (tcz - camera.position.z) * k;
  camLookTarget.x += (tlx - camLookTarget.x) * k;
  camLookTarget.y += (tly - camLookTarget.y) * k;
  camLookTarget.z += (tlz - camLookTarget.z) * k;

  // Camera shake on goal (decays)
  if (camShake > 0) {
    const s = camShake * 0.6;
    camera.position.x += (Math.random() - 0.5) * s;
    camera.position.y += (Math.random() - 0.5) * s;
    camera.position.z += (Math.random() - 0.5) * s;
    camShake = Math.max(0, camShake - dt * 1.6);
  }
  camera.lookAt(camLookTarget);
}

function render3() {
  if (composer) composer.render();
  else renderer.render(scene, camera);
}

function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

// ===== Loop =====
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt);
  syncScene(dt);
  updateParticles(dt);
  updateCamera(dt);
  render3();
  requestAnimationFrame(loop);
}

// Hide loading overlay & start the loop
const loadingEl = document.getElementById("loading");
loadingEl.classList.add("hide");
setTimeout(() => loadingEl.remove(), 400);
requestAnimationFrame(loop);

if (isTouchDevice) showTouchUI();
addEventListener("touchstart", showTouchUI, { once: true, passive: true });
</script>
